<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="Aumix">
	<style>
		text {
			font-family: 'Inter', Inter, system-ui, sans-serif;
			font-size: 22px;
			font-weight: 800;
			text-anchor: middle;
			dominant-baseline: middle;
		}

		@media (prefers-color-scheme: dark) {
			text {
				fill: #ffffff;
			}
		}

		@media (prefers-color-scheme: light) {
			text {
				fill: #000000;
			}
		}
	</style>
	<text x="16" y="17">A</text>
</svg>